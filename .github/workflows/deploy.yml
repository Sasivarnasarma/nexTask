name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/nexTask

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d

            docker image prune -f
